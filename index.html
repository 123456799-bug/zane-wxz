<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zane W | 王兴正 - 个人主页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zane: {
                            dark: '#0F172A',    
                            primary: '#165DFF', 
                            light: '#F8FAFC',
                            gray: '#64748B'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            }
            .bg-blur {
                backdrop-filter: blur(8px);
            }
            .scroll-smooth {
                scroll-behavior: smooth;
            }
            .fade-in {
                animation: fadeIn 0.8s ease-out forwards;
            }
            .slide-up {
                animation: slideUp 0.6s ease-out forwards;
            }
            .scale-in {
                animation: scaleIn 0.5s ease-out forwards;
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-zane-dark text-zane-light font-sans scroll-smooth">
    <!-- 页面加载动画 -->
    <div id="loader" class="fixed inset-0 bg-zane-dark flex items-center justify-center z-[100]">
        <div class="flex flex-col items-center">
            <div class="w-16 h-16 border-4 border-zane-primary border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-zane-primary text-lg font-bold">加载中...</p>
        </div>
    </div>
    <!-- 固定导航栏（统一跳转链接） -->
    <header class="fixed w-full top-0 z-50 bg-zane-dark/80 bg-blur">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <i class="fa-solid fa-user-circle text-2xl text-zane-primary"></i>
                <h1 class="text-xl md:text-2xl font-bold text-zane-primary">Zane W</h1>
            </a>
            
            <!-- 桌面导航 -->
            <nav class="hidden md:flex gap-6">
                <a href="index.html" class="text-zane-primary">首页</a>
                <a href="about.html" class="hover:text-zane-primary transition-colors">关于我</a>
                <a href="idol.html" class="hover:text-zane-primary transition-colors">我的榜样</a>
                <a href="growth.html" class="hover:text-zane-primary transition-colors">成长路径</a>
                <a href="contact.html" class="hover:text-zane-primary transition-colors">联系我</a>
            </nav>
            
            <!-- 移动端菜单按钮 -->
            <button id="menuBtn" class="md:hidden text-2xl">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
        
        <!-- 移动端导航 -->
        <div id="mobileMenu" class="hidden md:hidden bg-zane-dark/95 bg-blur absolute w-full">
            <div class="container mx-auto px-4 py-3 flex flex-col gap-3">
                <a href="index.html" class="py-2 text-zane-primary">首页</a>
                <a href="about.html" class="py-2 hover:text-zane-primary transition-colors">关于我</a>
                <a href="idol.html" class="py-2 hover:text-zane-primary transition-colors">我的榜样</a>
                <a href="growth.html" class="py-2 hover:text-zane-primary transition-colors">成长路径</a>
                <a href="contact.html" class="py-2 hover:text-zane-primary transition-colors">联系我</a>
            </div>
        </div>
    </header>

    <!-- 首屏英雄区 -->
    <section class="h-screen flex items-center justify-center relative overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="https://picsum.photos/seed/zanehero/1920/1080" alt="Zane W 个人主页" class="w-full h-full object-cover opacity-60">
        </div>
        <div class="container mx-auto px-4 z-10 text-center">
            <h1 class="text-[clamp(2.5rem,8vw,5rem)] font-bold text-zane-primary text-shadow mb-4">
                王兴正 | Zane W
            </h1>
            <p class="text-[clamp(1rem,3vw,1.5rem)] max-w-2xl mx-auto mb-8 text-shadow">
                名字不重要，我做过的事，定义了我
            </p>
            <div class="flex flex-wrap justify-center gap-4">
                <a href="about.html" class="bg-zane-primary text-white px-8 py-3 rounded-full font-bold hover:bg-blue-600 transition-colors inline-block">
                    了解我的故事
                </a>
                <a href="contact.html" class="bg-transparent border-2 border-zane-primary text-zane-primary px-8 py-3 rounded-full font-bold hover:bg-zane-primary/20 transition-colors inline-block">
                    联系我
                </a>
            </div>
        </div>
    </section>

    <!-- 首页简介模块 -->
    <section class="py-20 container mx-auto px-4">
        <div class="grid md:grid-cols-2 gap-12 items-center">
            <div>
                <h2 class="text-3xl md:text-4xl font-bold text-zane-primary mb-6">欢迎来到我的主页</h2>
                <p class="text-zane-gray mb-4 text-lg">
                    我是一名持续探索的实战派成长者，从少年时代的副业探索，到职场后的自我迭代，始终在寻找属于自己的成长路径。
                </p>
                <p class="text-zane-gray mb-6 text-lg">
                    我相信，人生不是复刻别人，而是在榜样的光芒下，成为更好的自己。
                </p>
                <a href="about.html" class="inline-flex items-center gap-2 text-zane-primary hover:text-blue-400 transition-colors">
                    查看我的经历 <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>
            <div class="rounded-lg overflow-hidden shadow-2xl">
                <img src="https://picsum.photos/seed/zaneintro/800/600" alt="个人简介" class="w-full h-auto">
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-zane-dark py-10 text-center border-t border-zane-primary/20">
        <div class="container mx-auto px-4">
            <div class="flex justify-center gap-6 text-2xl mb-4">
                <a href="wechat.html" class="text-green-500 hover:text-green-400" title="微信: dfdzlaile"><i class="fa-brands fa-weixin"></i></a>
                <a href="#" class="text-zane-primary hover:text-blue-400"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="javascript:void(0)" class="text-zane-primary hover:text-blue-400" title="电话: 18264708118" onclick="copyPhone()"><i class="fa-solid fa-phone"></i></a>
            </div>
            <p class="text-zane-gray mb-2">© 2026 Zane W | 持续成长，与时间做朋友</p>
            <p class="text-zane-gray text-sm">邮箱: 2464374766@qq.com</p>
        </div>
    </footer>

    <!-- 回到顶部按钮 -->
    <button id="backToTop" class="fixed bottom-6 right-6 w-12 h-12 bg-zane-primary rounded-full shadow-lg flex items-center justify-center text-white opacity-0 invisible transition-all duration-300 hover:bg-blue-600 hover:scale-110 z-50">
        <i class="fa-solid fa-arrow-up text-xl"></i>
    </button>

    <script>
        // 页面加载完成后隐藏加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            }, 800);
        });

        function copyPhone() {
            const phone = '18264708118';
            navigator.clipboard.writeText(phone).then(() => {
                alert('电话号码已复制: ' + phone);
            }).catch(err => {
                console.error('复制失败:', err);
            });
            return false;
        }
        
        // 移动端菜单切换
        const menuBtn = document.getElementById('menuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        
        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            const icon = menuBtn.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-times');
        });

        // 点击导航关闭移动端菜单
        const navLinks = mobileMenu.querySelectorAll('a');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.add('hidden');
                menuBtn.querySelector('i').classList.replace('fa-times', 'fa-bars');
            });
        });

        // 回到顶部按钮
        const backToTopBtn = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTopBtn.classList.remove('opacity-0', 'invisible');
                backToTopBtn.classList.add('opacity-100', 'visible');
            } else {
                backToTopBtn.classList.remove('opacity-100', 'visible');
                backToTopBtn.classList.add('opacity-0', 'invisible');
            }
        });
        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>

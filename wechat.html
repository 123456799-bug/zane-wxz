<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信二维码 - Zane W</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0F172A;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        .qr-code {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            color: #64748B;
            text-decoration: none;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: #165DFF;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-2xl font-bold text-white mb-4">添加微信</h1>
        <p class="text-gray-400 mb-6">扫码添加我的微信</p>
        <img src="wechat-qr.jpg.jpg" alt="微信二维码" class="qr-code">
        <p class="text-gray-400 mt-4 text-sm">微信号: dfdzlaile</p>
        <a href="index.html" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            返回首页
        </a>
    </div>
</body>
</html>
